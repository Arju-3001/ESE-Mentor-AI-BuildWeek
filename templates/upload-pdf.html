<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload PDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h2>📄 Upload PDF Notes</h2>

    <!-- Upload PDF -->
    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="pdf" accept=".pdf" required>

        <br><br>

        <button type="submit">Upload PDF</button>

    </form>

    {% if summary %}

    <hr>

    <h3>🤖 AI Summary</h3>

    <p>{{ summary }}</p>

    {% endif %}

    <hr>

    <h3>❓ Ask Question From PDF</h3>

    <form action="{{ url_for('ask_pdf') }}" method="POST">

        <input
            type="text"
            name="question"
            placeholder="Ask a question..."
            required
        >

        <br><br>

        <button type="submit">
            Ask AI
        </button>

    </form>

    {% if answer %}

    <hr>

    <h3>🤖 AI Answer</h3>

    <p>{{ answer }}</p>

    {% endif %}

    <hr>

    <h3>📝 Generate MCQs</h3>

    <form action="{{ url_for('generate_mcq') }}" method="POST">

        <button type="submit">
            Generate 10 MCQs
        </button>

    </form>

    {% if mcqs %}

    <hr>

    <h3>📘 Generated MCQs</h3>

    <pre>{{ mcqs }}</pre>

    {% endif %}

    <br>

    <a href="{{ url_for('dashboard') }}">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
